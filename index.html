<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEKERHOCA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Marquee: Beyaz zemin üzerine siyah yazı ile dikkat çekici */
        .marquee-wrap { 
            width: 100%; 
            overflow: hidden; 
            background: #fff; 
            padding: 12px 0;
            border-bottom: 4px solid #fff;
        }
        .marquee { 
            display: inline-block; 
            white-space: nowrap; 
            animation: scroll 12s linear infinite; 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: #000;
            text-transform: uppercase; 
        }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Daktilo Ekranı */
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        #daktilo { 
            font-size: clamp(1.2rem, 4vw, 2.5rem); 
            line-height: 1.6;
            border-right: 8px solid #fff; 
            padding-right: 15px; 
            animation: blink 0.7s infinite; 
            max-width: 900px;
        }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>
    <div class="marquee-wrap">
        <div class="marquee">ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT •</div>
    </div>
    
    <div class="main">
        <div id="daktilo"></div>
    </div>

    <script>
        // Freeman ile biten o daktilo satırı
        const text = "SİTE YAPIM AŞAMASINDA.\nŞEKER HOCA KOÇLUK VE EDEBİYAT.\nFREEMAN ENTERPRISES © 2020-2026";
        const el = document.getElementById("daktilo");
        let i = 0;
        
        function type() {
            if (i < text.length) {
                // <br> ile alt satıra geçişi sağla
                el.innerHTML += text.charAt(i) === "\n" ? "<br><br>" : text.charAt(i);
                i++;
                // Daktilo hızı: Biraz daha keskin olsun
                setTimeout(type, Math.random() * 80 + 30);
            }
        }
        
        window.onload = type;
    </script>
</body>
</html>
