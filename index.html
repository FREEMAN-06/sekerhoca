<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEKERHOCA | SİSTEM</title>
    <style>
        /* Saf Minimalist Brutalizm */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Marquee Bandı */
        .marquee-wrap { width: 100%; overflow: hidden; border-bottom: 2px solid #fff; padding: 10px 0; }
        .marquee { 
            display: inline-block; 
            white-space: nowrap; 
            animation: scroll 15s linear infinite; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Daktilo Ekranı */
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #daktilo { 
            font-size: clamp(1.5rem, 5vw, 3rem); 
            line-height: 1.4;
            border-right: 10px solid #fff; 
            padding-right: 15px; 
            animation: blink 0.8s infinite; 
        }
        @keyframes blink { 50% { border-color: transparent; } }

        /* Kurumsal Footer */
        .footer { 
            padding: 20px; 
            font-size: 0.7rem; 
            border-top: 1px solid #333; 
            text-align: center; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>
    <div class="marquee-wrap">
        <div class="marquee">ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT •</div>
    </div>
    
    <div class="main">
        <div id="daktilo"></div>
    </div>

    <footer class="footer">
        FREEMAN ENTERPRISES © 2020-2026. ALL RIGHTS RESERVED. TRADEMARK REGISTERED.
    </footer>

    <script>
        const text = "SİTE YAPIM AŞAMASINDA.\nŞEKER HOCA KOÇLUK VE EDEBİYAT.\nSİSTEMLER YENİLENİYOR.";
        const el = document.getElementById("daktilo");
        let i = 0;
        
        function type() {
            if (i < text.length) {
                // \n karakterini <br> etiketine çevirip satır atlatıyoruz
                el.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
                i++;
                // Rastgele daktilo ritmi için gecikme
                setTimeout(type, Math.random() * 100 + 40);
            }
        }
        
        // Sayfa yüklenince daktilo başlasın
        window.onload = type;
    </script>
</body>
</html>
