<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ŞEKERHOCA</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .marquee-wrap { background: #fff; color: #000; padding: 10px 0; overflow: hidden; border-bottom: 2px solid #fff; }
        .marquee { white-space: nowrap; animation: scroll 5s linear infinite; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #terminal { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; font-size: 2rem; }
        .line { min-height: 2.2rem; }
        .cursor { display: inline-block; width: 10px; height: 1.5rem; background: #fff; vertical-align: middle; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="marquee-wrap">
        <div class="marquee">ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT</div>
    </div>
    
    <div id="terminal"></div>

    <script>
        const sentences = [
            "SİTE YAPIM AŞAMASINDA",
            "ŞEKER HOCA KOÇLUK VE EDEBİYAT",
            "FREEMAN ENTERPRISES © 2020-2026"
        ];
        
        const terminal = document.getElementById("terminal");

        async function type() {
            for (let sentence of sentences) {
                const line = document.createElement("div");
                line.className = "line";
                terminal.appendChild(line);
                
                const cursor = document.createElement("span");
                cursor.className = "cursor";
                line.appendChild(cursor);
                
                for (let char of sentence) {
                    cursor.insertAdjacentText('beforebegin', char);
                    await new Promise(r => setTimeout(r, Math.random() * 70 + 20));
                }
                cursor.remove();
            }
        }
        window.onload = type;
    </script>
</body>
</html>
