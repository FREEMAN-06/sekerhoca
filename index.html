<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEKERHOCA</title>
    <style>
        /* CSS Reset - Brutalist Temel */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Marquee */
        .marquee { 
            background: #fff; 
            color: #000; 
            padding: 10px 0; 
            white-space: nowrap; 
            overflow: hidden; 
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.5rem;
            border-bottom: 2px solid #fff;
        }
        .marquee span { 
            display: inline-block; 
            animation: marquee 10s linear infinite; 
        }

        @keyframes marquee { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }

        /* Daktilo Ekranı */
        .viewport { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        #output { 
            font-size: clamp(1.2rem, 4vw, 2.5rem); 
            line-height: 1.4;
            max-width: 800px;
            width: 100%;
        }

        .cursor { 
            display: inline-block; 
            width: 0.6ch; 
            height: 1.2em; 
            background: #fff; 
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="marquee">
        <span>ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT</span>
    </div>

    <main class="viewport">
        <div id="output"></div>
    </main>

    <script>
        const content = "SİTE YAPIM AŞAMASINDA\nŞEKER HOCA KOÇLUK VE EDEBİYAT\nFREEMAN ENTERPRISES © 2020-2026";
        const output = document.getElementById("output");

        // Yardımcı: Bekleme süresi
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function typeWriter() {
            let i = 0;
            while (i < content.length) {
                let char = content.charAt(i);
                
                // Satır sonlarını işle
                if (char === "\n") {
                    output.innerHTML += "<br><br>";
                } else {
                    output.innerHTML = output.innerHTML.replace('<span class="cursor"></span>', '') + char + '<span class="cursor"></span>';
                }
                
                // Daktilo hızı (Rastgelelik yok, sabit ve net)
                await sleep(70);
                i++;
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
