<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şekerhoca | İŞLEMDE</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #yazi {
            font-size: clamp(1.5rem, 5vw, 3rem);
            white-space: pre-wrap;
            text-align: center;
            line-height: 1.6;
            max-width: 80%;
            border-right: 15px solid #fff; /* İmleç */
            padding-right: 10px;
            animation: imlec 0.8s infinite;
        }

        @keyframes imlec {
            0%, 100% { border-color: #fff; }
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="yazi"></div>

    <script>
        const metin = "SİTE YAPIM AŞAMASINDA.\nŞEKER HOCA KOÇLUK VE EDEBİYAT.\nFREEMAN ENTERPRISES İŞLEMDE.";
        const element = document.getElementById("yazi");
        let i = 0;

        function daktilo() {
            if (i < metin.length) {
                element.innerHTML += metin.charAt(i);
                i++;
                // Daktilo hızı (rastgele biraz titreme ekleyebiliriz)
                setTimeout(daktilo, Math.random() * 100 + 50);
            }
        }

        window.onload = daktilo;
    </script>
</body>
</html>
