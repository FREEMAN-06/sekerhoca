<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şekerhoca | YAPIM AŞAMASINDA</title>
    <style>
        /* CSS Reset & Brutalist Temel Ayarlar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Saf Çiğ Brutalist Renk Paleti */
            --bg-color: #FFFFFF;       /* Çiğ Beyaz */
            --text-color: #000000;     /* Saf Siyah */
            --brutal-red: #FF0033;     /* Agresif Uyarı Kırmızısı */
            --border-thick: 5px solid #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Sert ve köşeli Serif font */
            font-family: 'Impact', 'Arial Black', sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Ana İçerik Kutusu */
        .container {
            text-align: center;
            border: var(--border-thick);
            padding: 5rem 2rem 4rem 2rem;
            position: relative;
            background: var(--bg-color);
            /* Devasa sert kırmızı gölge */
            box-shadow: 20px 20px 0px var(--brutal-red); 
            max-width: 100%;
            width: 680px;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Köşelerdeki Sert Siyah Kareler */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--brutal-red);
            border: var(--border-thick);
        }
        .container::before { top: -18px; left: -18px; }
        .container::after { bottom: -18px; right: -18px; }

        /* Başlık - Devasa, Sıkışık, Agresif Tipografi */
        h1 {
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin-bottom: 2rem;
            line-height: 0.85;
            color: var(--text-color);
        }

        /* Alt Metin - Kara Blok İçinde Beyaz Vurgu */
        p {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 900;
            background-color: var(--text-color);
            color: #FFFFFF;
            padding: 12px 24px;
            margin-bottom: 3rem;
            letter-spacing: 2px;
            border: 3px solid var(--brutal-red);
            display: inline-block;
            width: 100%;
            text-transform: uppercase;
        }

        /* Kırmızı Brutalist Kare Yükleniyor Animasyonu */
        .loader {
            display: inline-flex;
            gap: 15px;
            margin-bottom: 4rem;
        }

        .loader span {
            width: 25px;
            height: 25px;
            background-color: var(--brutal-red);
            border: 4px solid var(--text-color);
            animation: bounce 1.2s infinite ease-in-out both;
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }

        /* Freeman Enterprises İmza Butonu */
        .freeman-link-container {
            width: 100%;
            border-top: var(--border-thick);
            padding-top: 2rem;
            margin-top: auto;
        }

        .freeman-link {
            text-decoration: none;
            color: #FFFFFF;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 1.1rem;
            background-color: var(--brutal-red);
            padding: 12px 24px;
            border: var(--border-thick);
            box-shadow: 6px 6px 0px var(--text-color);
            display: inline-block;
            text-transform: uppercase;
            transition: all 0.1s steps(2);
        }

        .freeman-link:hover {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px var(--text-color);
            background-color: var(--text-color);
            color: var(--brutal-red);
        }

        /* GÖZE BATAN DEVASA KAYAN YAZI (MARQUEE) */
        .marquee-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--brutal-red);
            color: #FFFFFF;
            padding: 16px 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: clamp(1.2rem, 3vw, 1.6rem); /* Yazı büyütüldü */
            text-transform: uppercase;
            overflow: hidden;
            border-bottom: 6px solid var(--text-color);
            box-shadow: 0px 5px 0px rgba(0,0,0,0.1);
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 12s linear infinite; /* Hızlandırıldı */
        }

        /* --- ANİMASYONLAR --- */
        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.3); border-radius: 50%; }
            40% { transform: scale(1) rotate(45deg); border-radius: 0%; }
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* --- MOBİL AYARLAR --- */
        @media (max-width: 480px) {
            .container {
                padding: 4rem 1.2rem 2.5rem 1.2rem;
                box-shadow: 12px 12px 0px var(--brutal-red);
            }
            .container::before, .container::after {
                width: 20px;
                height: 20px;
            }
            .container::before { top: -12px; left: -12px; }
            .container::after { bottom: -12px; right: -12px; }
            .freeman-link {
                font-size: 0.9rem;
                padding: 10px 18px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">
            ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT • ŞEKER HOCA • KOÇLUK • EDEBİYAT • 
        </div>
    </div>

    <div class="container">
        <h1>Şekerhoca</h1>
        <p>SİTE YAPIM AŞAMASINDA</p>
        
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="freeman-link-container">
            <a href="#" target="_blank" class="freeman-link">DESIGN BY FREEMAN ENTERPRISES</a>
        </div>
    </div>

</body>
</html>
