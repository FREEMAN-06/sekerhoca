<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEKERHOCA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Marquee: Hızlı, temiz, noktasız */
        .marquee-container { 
            width: 100%; 
            background: #fff; 
            padding: 15px 0;
            overflow: hidden;
            border-bottom: 2px solid #fff;
        }

        .marquee-text { 
            display: inline-block; 
            white-space: nowrap; 
            animation: move 8s linear infinite; 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: #000;
            text-transform: uppercase;
        }

        @keyframes move { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }

        /* Daktilo Ekranı: Minimal ve keskin */
        .main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        #daktilo { 
            font-size: clamp(1.5rem, 5vw, 3rem); 
            line-height: 1.5;
            max-width: 800px;
        }

        .cursor {
            display: inline-block;
            width: 15px;
            height: 30px;
            background: #fff;
            vertical-align: middle;
            animation: blink 0.6s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">
            ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT ŞEKER HOCA KOÇLUK EDEBİYAT
        </div>
    </div>
    
    <div class="main">
        <div id="daktilo"></div>
    </div>

    <script>
        const text = "SİTE YAPIM AŞAMASINDA\nŞEKER HOCA KOÇLUK VE EDEBİYAT\nFREEMAN ENTERPRISES © 2020-2026";
        const el = document.getElementById("daktilo");
        let i = 0;
        
        function type() {
            if (i < text.length) {
                el.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
                i++;
                // Daktilo hızı: Daha mekanik ve ritmik
                setTimeout(type, 60);
            } else {
                el.innerHTML = text + '<span class="cursor"></span>';
            }
        }
        
        window.onload = type;
    </script>
</body>
</html>
